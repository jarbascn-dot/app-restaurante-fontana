name: Send Scheduled Notifications
on:
  schedule:
      - cron: '*/5 * * * *'
        workflow_dispatch:
        jobs:
          send-notifications:
              runs-on: ubuntu-latest
                  steps:
                        - name: Trigger endpoint every minute for 5 minutes
                                run: |
                                          for i in 1 2 3 4 5; do
                                                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://app-restaurante-fontana.vercel.app/api/send-notifications" -H "Accept: application/json")
                                                                  echo "Minute $i: HTTP $STATUS"
                                                                              if [ $i -lt 5 ]; then sleep 60; fi
                                                                                        done

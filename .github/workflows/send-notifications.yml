name: Send Scheduled Notifications

on:
  schedule:
      # Run every 5 minutes (GitHub Actions minimum granularity)
          - cron: '*/5 * * * *'
            workflow_dispatch:  # Allow manual triggering for testing

            jobs:
              send-notifications:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Trigger send-notifications endpoint
                                    run: |
                                              # Call the Vercel endpoint up to 5 times (once per minute within this 5-min window)
                                                        for i in 1 2 3 4 5; do
                                                                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
                                                                                  "https://app-restaurante-fontana.vercel.app/api/send-notifications" \
                                                                                                -H "Accept: application/json")
                                                                                                            echo "Minute $i: HTTP $STATUS"
                                                                                                                        if [ $i -lt 5 ]; then
                                                                                                                                      sleep 60
                                                                                                                                                  fi
                                                                                                                                                            done
